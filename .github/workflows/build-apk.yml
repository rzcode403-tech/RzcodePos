name: Build APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # تحديث من v3 إلى v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.3.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Analyze code
      run: flutter analyze
    
    - name: Build APK (Release)
      run: flutter build apk --release
    
    - name: Build AAB (Release)
      run: flutter build appbundle --release
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4  # تحديث من v3 إلى v4
      with:
        name: APK-Release
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        if-no-files-found: error  # إضافة: فشل إذا لم يتم العثور على الملف
    
    - name: Create Release
      uses: softprops/action-gh-release@v2  # تحديث: استخدام إصدار أكثر حداثة
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }} - ${{ steps.date.outputs.date }}
        draft: false
        prerelease: false
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/bundle/release/app-release.aab
        generate_release_notes: true  # إضافة: توليد ملاحظات الإصدار تلقائياً
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
