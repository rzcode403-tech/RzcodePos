name: Build APK Release

on:
  push:
    tags:
      - 'v*'
    branches: [ main ]  # للاختبار عند الدفع إلى main
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: Verify Android V2 Embedding
      run: |
        echo "=== Checking AndroidManifest.xml ==="
        cat android/app/src/main/AndroidManifest.xml | grep -A2 "flutterEmbedding"
        
        echo "=== Checking MainActivity.kt ==="
        cat android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt 2>/dev/null || echo "File not found, will create"
        
        # إنشاء الملف إذا لم يكن موجوداً
        if [ ! -f android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt ]; then
          mkdir -p android/app/src/main/kotlin/com/rzcode/supermarcepos
          cat > android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt << 'EOF'
          package com.rzcode.supermarcepos
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity()
          EOF
          echo "Created MainActivity.kt"
        fi
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SuperMarche-POS-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
