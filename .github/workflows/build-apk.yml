name: Build APK Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: DELETE old Android folder and create new one
      run: |
        rm -rf android
        mkdir temp_project
        cd temp_project
        flutter create --platforms=android .
        cd ..
        cp -r temp_project/android .
        rm -rf temp_project
        echo "✅ New Android folder created"
    
    - name: Fix Android configuration
      run: |
        # تعديل اسم الحزمة
        sed -i 's/com.example.supermarche_pos/com.rzcode.supermarcepos/g' android/app/src/main/AndroidManifest.xml
        
        # إضافة الصلاحيات
        sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
        
        # إنشاء build.gradle الصحيح
        cat > android/app/build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }
        
        def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
        if (flutterVersionCode == null) {
            flutterVersionCode = '1'
        }
        
        def flutterVersionName = localProperties.getProperty('flutter.versionName')
        if (flutterVersionName == null) {
            flutterVersionName = '1.0'
        }
        
        android {
            namespace = "com.rzcode.supermarcepos"
            compileSdk = 34
            ndkVersion = flutter.ndkVersion
        
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
        
            kotlinOptions {
                jvmTarget = JavaVersion.VERSION_17.toString()
            }
        
            defaultConfig {
                applicationId = "com.rzcode.supermarcepos"
                minSdk = 21
                targetSdk = 34
                versionCode = flutterVersionCode.toInteger()
                versionName = flutterVersionName
            }
        
            buildTypes {
                release {
                    signingConfig = signingConfigs.debug
                }
            }
        }
        
        flutter {
            source = "../.."
        }
        EOF
        
        # إعداد gradle.properties
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4G
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        echo "✅ Android configuration fixed"
    
    - name: Create MainActivity.kt
      run: |
        mkdir -p android/app/src/main/kotlin/com/rzcode/supermarcepos
        cat > android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt << 'EOF'
        package com.rzcode.supermarcepos
        
        import io.flutter.embedding.android.FlutterActivity
        
        class MainActivity: FlutterActivity()
        EOF
    
    - name: Add flutterEmbedding to Manifest
      run: |
        if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
          sed -i '/<\/application>/i\    <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        fi
        echo "✅ flutterEmbedding added"
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Rename APK
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
        mv build/app/outputs/flutter-apk/app-release.apk \
           build/app/outputs/flutter-apk/SuperMarche-POS-v${VERSION}.apk
        echo "✅ APK renamed to SuperMarche-POS-v${VERSION}.apk"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SuperMarche-POS-v${{ github.run_number }}
        path: build/app/outputs/flutter-apk/SuperMarche-POS-v*.apk
        retention-days: 30
