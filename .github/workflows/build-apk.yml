name: Build APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Clean and prepare Android
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean
        cd ..
        flutter clean
    
    - name: Enable AndroidX
      run: |
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
    
    - name: Verify Android Embedding
      run: |
        grep -q "flutterEmbedding.*2" android/app/src/main/AndroidManifest.xml && echo "✓ Embedding v2 found" || echo "✗ Embedding v2 not found"
        grep -q "FlutterActivity" android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt && echo "✓ MainActivity updated" || echo "✗ MainActivity needs update"
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
