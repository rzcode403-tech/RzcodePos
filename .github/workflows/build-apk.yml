name: Build APK Release

on:
  push:
    tags:
      - 'v*'
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: DELETE old Android folder and create new one
      run: |
        # حذف مجلد android القديم بالكامل
        rm -rf android
        
        # إنشاء مشروع Flutter جديد مؤقت للحصول على مجلد android نظيف
        mkdir temp_project
        cd temp_project
        flutter create --platforms=android .
        cd ..
        
        # نسخ مجلد android الجديد إلى المشروع
        cp -r temp_project/android .
        
        # تنظيف المشروع المؤقت
        rm -rf temp_project
        
        echo "✅ New Android folder created with V2 embedding"
    
    - name: Fix package name and permissions
      run: |
        # تعديل اسم الحزمة في AndroidManifest.xml
        sed -i 's/com.example.supermarche_pos/com.rzcode.supermarcepos/g' android/app/src/main/AndroidManifest.xml
        
        # إضافة الصلاحيات المطلوبة
        sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
        
        # تعديل build.gradle
        cat > android/app/build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        
        android {
            namespace = "com.rzcode.supermarcepos"
            compileSdk = 34
            ndkVersion = flutter.ndkVersion
        
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
        
            kotlinOptions {
                jvmTarget = JavaVersion.VERSION_17.toString()
            }
        
            defaultConfig {
                applicationId = "com.rzcode.supermarcepos"
                minSdk = 21
                targetSdk = 34
                versionCode = flutter.versionCode
                versionName = flutter.versionName
            }
        
            buildTypes {
                release {
                    signingConfig = signingConfigs.debug
                }
            }
        }
        
        flutter {
            source = "../.."
        }
        EOF
        
        # إعداد gradle.properties
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4G
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        echo "✅ Android configuration fixed"
    
    - name: Create MainActivity.kt
      run: |
        mkdir -p android/app/src/main/kotlin/com/rzcode/supermarcepos
        cat > android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt << 'EOF'
        package com.rzcode.supermarcepos
        
        import io.flutter.embedding.android.FlutterActivity
        
        class MainActivity: FlutterActivity()
        EOF
        echo "✅ MainActivity.kt created"
    
    - name: Verify V2 Embedding
      run: |
        echo "=== Verifying AndroidManifest.xml ==="
        grep -A2 "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "Adding flutterEmbedding..."
        
        # إضافة flutterEmbedding إذا لم يكن موجوداً
        if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
          sed -i '/<\/application>/i\    <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        fi
        
        echo "=== Verifying MainActivity.kt ==="
        cat android/app/src/main/kotlin/com/rzcode/supermarcepos/MainActivity.kt
        
        echo "=== Verifying build.gradle ==="
        head -20 android/app/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SuperMarche-POS-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
